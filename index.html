<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard | Weather-AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>🌤️ Weather Dashboard</h1>
        
        <div class="location-input">
            <input type="text" id="cityInput" placeholder="Enter city name or coordinates (e.g., Nairobi or -1.2921,36.8219)">
            <button onclick="getWeatherByLocation()">Search</button>
            <button onclick="getMyLocationWeather()">📍 Use My Location</button>
        </div>

        <div class="unit-toggle">
            <button id="celsiusBtn" class="active">°C</button>
            <button id="fahrenheitBtn">°F</button>
        </div>

        <div id="loading" class="loading hidden">Loading weather data...</div>
        <div id="error" class="error hidden"></div>
        <div id="weatherContent" class="weather-content hidden"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
