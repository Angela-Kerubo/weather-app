<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WeatherAI - Your Personal Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app">
        <div class="weather-card">
            <h1>🌤️ WeatherAI</h1>
            
            <div class="search-box">
                <input 
                    type="text" 
                    id="cityInput" 
                    placeholder="Enter city name..."
                    autocomplete="off"
                >
                <button id="searchBtn">🔍 Search</button>
                <button id="locationBtn" class="location-btn">📍 My Location</button>
            </div>

            <div id="loading" class="loading hidden">
                <div class="spinner"></div>
                <p>Fetching weather data...</p>
            </div>
            
            <div id="error" class="error hidden"></div>
            
            <div id="weatherInfo" class="weather-info hidden">
                <div class="location">
                    <h2 id="cityName">--</h2>
                    <p id="country">--</p>
                </div>

                <div class="temp-section">
                    <div class="weather-icon" id="weatherIcon">🌤️</div>
                    <div class="temperature" id="temperature">--°C</div>
                    <div class="condition" id="condition">Loading...</div>
                </div>

                <div class="details">
                    <div class="detail">
                        <span>💧 Humidity</span>
                        <strong id="humidity">--%</strong>
                    </div>
                    <div class="detail">
                        <span>🌬️ Wind</span>
                        <strong id="wind">-- km/h</strong>
                    </div>
                    <div class="detail">
                        <span>🎯 Feels like</span>
                        <strong id="feelsLike">--°C</strong>
                    </div>
                </div>

                <div class="ai-summary" id="aiSummary">
                    <div class="ai-header">🤖 AI Weather Insight</div>
                    <p id="summaryText">Analyzing weather patterns...</p>
                </div>

                <div class="forecast-section">
                    <h3>📅 5-Day Forecast</h3>
                    <div class="forecast" id="forecast"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
